openapi: 3.0.3
info:
  title: Bifrost Admin API
  description: Edge router management API for route configuration and analytics
  version: 1.15.2
  contact:
    name: Henry Chong
    url: https://example.com

servers:
  - url: https://bifrost.example.com
    description: Production

security:
  - ApiKeyAuth: []

paths:
  # System endpoints
  /health:
    get:
      summary: Health check
      security: []  # No auth required
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # Route management
  /api/routes:
    get:
      summary: List routes or get single route
      parameters:
        - $ref: '#/components/parameters/PathQuery'
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutesResponse'
    post:
      summary: Create route
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRouteInput'
      responses:
        '201':
          description: Created
    put:
      summary: Update route
      parameters:
        - $ref: '#/components/parameters/PathQueryRequired'
        - $ref: '#/components/parameters/DomainQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRouteInput'
      responses:
        '200':
          description: Updated
    delete:
      summary: Delete route
      parameters:
        - $ref: '#/components/parameters/PathQueryRequired'
        - $ref: '#/components/parameters/DomainQuery'
      responses:
        '200':
          description: Deleted

  /api/routes/seed:
    post:
      summary: Bulk seed routes
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeedRoutesInput'
      responses:
        '200':
          description: Seeded

  /api/routes/migrate:
    post:
      summary: Migrate route to new path
      description: Atomically moves a route from oldPath to newPath, preserving createdAt timestamp.
      tags: [Routes]
      parameters:
        - name: oldPath
          in: query
          required: true
          description: Current route path to migrate from
          schema:
            type: string
            pattern: ^/.*
        - name: newPath
          in: query
          required: true
          description: New route path to migrate to
          schema:
            type: string
            pattern: ^/.*
        - $ref: '#/components/parameters/DomainQuery'
      responses:
        '200':
          description: Route migrated successfully
        '400':
          description: Invalid parameters
        '404':
          description: Route not found at oldPath
        '409':
          description: Route already exists at newPath

  /api/routes/transfer:
    post:
      summary: Transfer route between domains
      description: Moves a route from one domain to another, preserving all configuration and original createdAt timestamp.
      tags: [Routes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path, fromDomain, toDomain]
              properties:
                path:
                  type: string
                  pattern: ^/.*
                  description: Route path to transfer
                fromDomain:
                  type: string
                  description: Source domain
                toDomain:
                  type: string
                  description: Destination domain
      responses:
        '200':
          description: Route transferred successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/RouteConfig'
        '400':
          description: Invalid parameters (missing fields, invalid domain, same source/destination)
        '404':
          description: Route not found on source domain
        '409':
          description: Route already exists on destination domain

  /api/routes/normalize-case:
    post:
      summary: Normalize all route paths to lowercase
      description: One-time admin-only migration endpoint. Converts existing routes with uppercase paths to lowercase. Idempotent.
      tags: [Routes]
      responses:
        '200':
          description: Migration complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      migrated:
                        type: integer
                      skipped:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: string
        '401':
          description: Missing or invalid admin API key

  /api/routes/by-target:
    get:
      summary: Find routes by R2 target
      description: Returns all R2-type routes pointing to a specific bucket/key combination. Routes include a domain field.
      tags: [Routes]
      parameters:
        - name: bucket
          in: query
          required: true
          description: R2 bucket name
          schema:
            type: string
        - name: target
          in: query
          required: true
          description: R2 object key
          schema:
            type: string
      responses:
        '200':
          description: Matching routes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      routes:
                        type: array
                        items:
                          $ref: '#/components/schemas/RouteConfigWithDomain'
        '400':
          description: Missing required query parameters

  /api/backups/health:
    get:
      summary: Check backup system health
      responses:
        '200':
          description: Health status (check `status` field for healthy/warning/critical)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupHealthResponse'

  # Analytics endpoints
  /api/analytics/summary:
    get:
      summary: Analytics dashboard overview
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
      responses:
        '200':
          description: Success

  /api/analytics/clicks:
    get:
      summary: List link clicks
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/SlugQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Success

  /api/analytics/clicks/{slug}:
    get:
      summary: Get stats for specific slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
      responses:
        '200':
          description: Success
        '404':
          description: No clicks found

  /api/analytics/views:
    get:
      summary: List page views
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/PathFilterQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Success

  /api/analytics/downloads:
    get:
      summary: List file downloads
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/PathFilterQuery'
        - $ref: '#/components/parameters/R2KeyQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Success

  /api/analytics/downloads/{path}:
    get:
      summary: Get stats for specific download path
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
      responses:
        '200':
          description: Success

  /api/analytics/proxy:
    get:
      summary: List proxy requests
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/PathFilterQuery'
        - $ref: '#/components/parameters/TargetUrlQuery'
        - $ref: '#/components/parameters/CountryQuery'
      responses:
        '200':
          description: Success

  /api/analytics/proxy/{path}:
    get:
      summary: Get stats for specific proxy path
      parameters:
        - name: path
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
      responses:
        '200':
          description: Success

  # R2 Storage endpoints
  /api/storage/buckets:
    get:
      summary: List R2 buckets
      tags: [Storage]
      responses:
        '200':
          description: List of buckets with access levels

  /api/storage/{bucket}/objects:
    get:
      summary: List objects in bucket
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - name: prefix
          in: query
          schema:
            type: string
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 1000
        - name: delimiter
          in: query
          schema:
            type: string
            default: /
      responses:
        '200':
          description: Object listing

  /api/storage/{bucket}/meta/{key}:
    get:
      summary: Get object metadata
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      responses:
        '200':
          description: Object metadata
        '404':
          description: Object not found

  /api/storage/{bucket}/objects/{key}:
    get:
      summary: Download object
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      responses:
        '200':
          description: Object body
        '404':
          description: Object not found
    delete:
      summary: Delete object
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      responses:
        '200':
          description: Deleted
        '403':
          description: Read-only bucket

  /api/storage/{bucket}/upload:
    post:
      summary: Upload object
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, key]
              properties:
                file:
                  type: string
                  format: binary
                key:
                  type: string
      responses:
        '200':
          description: Upload successful
        '403':
          description: Read-only bucket
        '400':
          description: Invalid R2 key

  /api/storage/{bucket}/rename:
    post:
      summary: Rename/move object
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldKey, newKey]
              properties:
                oldKey:
                  type: string
                newKey:
                  type: string
      responses:
        '200':
          description: Renamed
        '413':
          description: Object too large for copy operation

  /api/storage/{bucket}/move:
    post:
      summary: Move object to different bucket
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, destinationBucket]
              properties:
                key:
                  type: string
                destinationBucket:
                  type: string
                destinationKey:
                  type: string
      responses:
        '200':
          description: Moved
        '409':
          description: Destination already exists
        '413':
          description: Object too large for copy operation

  /api/storage/{bucket}/metadata/{key}:
    put:
      summary: Update object metadata
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contentType:
                  type: string
                cacheControl:
                  type: string
                contentDisposition:
                  type: string
      responses:
        '200':
          description: Metadata updated
        '413':
          description: Object too large for copy operation

  /api/storage/{bucket}/comment/{key}:
    put:
      summary: Set or clear a file's free-text comment
      description: >-
        Sets or clears the single editable plain-text note attached to an R2
        object. The note is stored in the D1 file_comments sidecar (not R2
        metadata), so the edit is a single upsert with no object copy and works
        regardless of file size. The `comment` field is required: send a string
        to set, or null / empty string to clear.
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comment]
              properties:
                comment:
                  type: string
                  nullable: true
                  maxLength: 1000
                  description: Note text, or null / empty string to clear
      responses:
        '200':
          description: Comment set or cleared
        '400':
          description: Invalid R2 key or comment (e.g. over the 1000-character limit)
        '403':
          description: Read-only bucket
        '404':
          description: Object not found

  /api/storage/{bucket}/purge-cache/{key}:
    post:
      summary: Purge CDN cache for R2 object
      description: >-
        Purges Cloudflare edge cache for all routes serving a specific R2 object.
        Uses the Cloudflare Zone Cache Purge API. Gracefully degrades without
        CLOUDFLARE_API_TOKEN (returns URLs but purged=0).
      tags: [Storage]
      parameters:
        - $ref: '#/components/parameters/BucketPath'
        - $ref: '#/components/parameters/R2KeyPath'
      responses:
        '200':
          description: Cache purge result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      purged:
                        type: integer
                        description: Number of cache entries successfully purged
                      failed:
                        type: integer
                        description: Number of cache entries that failed to purge
                      urls:
                        type: array
                        items:
                          type: string
                        description: URLs that were targeted for purging
        '400':
          description: Unknown bucket

  /api/analytics/audit:
    get:
      summary: List audit logs
      parameters:
        - $ref: '#/components/parameters/DomainQuery'
        - $ref: '#/components/parameters/DaysQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
        - $ref: '#/components/parameters/ActionQuery'
        - $ref: '#/components/parameters/ActorQuery'
        - $ref: '#/components/parameters/PathFilterQuery'
        - $ref: '#/components/parameters/SourceQuery'
      responses:
        '200':
          description: Success

  # Feedback work-queue
  /api/feedback:
    post:
      summary: Submit feedback
      description: >-
        Submit a feedback item as multipart/form-data. Optional screenshots
        (PNG/JPEG/WebP, up to 3, max 5 MB each) and an optional console/network
        capture bundle are stored in the isolated bifrost-feedback R2 bucket.
      tags: [Feedback]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, title, description]
              properties:
                type:
                  type: string
                  enum: [bug, feature, question, other]
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                title:
                  type: string
                  maxLength: 200
                description:
                  type: string
                  maxLength: 5000
                steps:
                  type: string
                  maxLength: 2000
                expected:
                  type: string
                  maxLength: 2000
                actual:
                  type: string
                  maxLength: 2000
                context:
                  type: string
                  description: JSON string of Tier-1 environment metadata
                capture:
                  type: string
                  description: JSON string of the console/network/breadcrumb capture bundle
                screenshot:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Up to 3 screenshot files
                submitterEmail:
                  type: string
                  maxLength: 320
                submitterName:
                  type: string
                  maxLength: 320
      responses:
        '201':
          description: Feedback created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FeedbackItem'
        '400':
          description: Invalid submission (missing/invalid fields, bad screenshot type)
        '413':
          description: Submission, context, capture bundle, or a screenshot too large
    get:
      summary: List feedback
      tags: [Feedback]
      parameters:
        - $ref: '#/components/parameters/FeedbackStatusQuery'
        - $ref: '#/components/parameters/FeedbackTypeQuery'
        - $ref: '#/components/parameters/FeedbackPriorityQuery'
        - $ref: '#/components/parameters/FeedbackSinceQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Feedback listing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      feedback:
                        type: array
                        items:
                          $ref: '#/components/schemas/FeedbackItem'
                      total:
                        type: integer

  /api/feedback/export:
    get:
      summary: Export feedback
      description: Admin export of feedback items as JSON or Markdown (capped at the first 200 items).
      tags: [Feedback]
      parameters:
        - name: format
          in: query
          description: Export format
          schema:
            type: string
            enum: [json, md]
            default: json
      responses:
        '200':
          description: Export (application/json or text/markdown depending on format)

  /api/feedback/{id}:
    get:
      summary: Get single feedback item
      tags: [Feedback]
      parameters:
        - $ref: '#/components/parameters/FeedbackIdPath'
      responses:
        '200':
          description: Feedback item
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FeedbackItem'
        '404':
          description: Feedback not found
    patch:
      summary: Triage feedback item
      description: Apply a triage patch. All fields optional, but at least one must be provided.
      tags: [Feedback]
      parameters:
        - $ref: '#/components/parameters/FeedbackIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TriageFeedbackInput'
      responses:
        '200':
          description: Feedback triaged
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/FeedbackItem'
        '400':
          description: Invalid or empty triage payload
        '404':
          description: Feedback not found
    delete:
      summary: Delete feedback item
      description: Deletes the feedback row and cascades deletion of its R2 artifacts.
      tags: [Feedback]
      parameters:
        - $ref: '#/components/parameters/FeedbackIdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      shortId:
                        type: string
        '404':
          description: Feedback not found

  /api/feedback/{id}/attachment/{key}:
    get:
      summary: Download a feedback attachment
      description: >-
        Serves a screenshot or capture-bundle byte stream owned by the feedback
        item. The key must belong to the item (a screenshot key or its capture
        key) — arbitrary bucket reads are rejected.
      tags: [Feedback]
      parameters:
        - $ref: '#/components/parameters/FeedbackIdPath'
        - name: key
          in: path
          required: true
          description: Attachment R2 key (may contain slashes) owned by this item
          schema:
            type: string
      responses:
        '200':
          description: Attachment body
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: Feedback or attachment not found

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Admin-Key

  parameters:
    PathQuery:
      name: path
      in: query
      description: Route path for single route lookup
      schema:
        type: string
        pattern: ^/.*

    PathQueryRequired:
      name: path
      in: query
      required: true
      description: Route path (required)
      schema:
        type: string
        pattern: ^/.*

    DomainQuery:
      name: domain
      in: query
      description: Target domain
      schema:
        type: string
        enum:
          - example.com
          - links.example.com
          - bifrost.example.com
          - secondary.example.net
          - user1.example.com
          - user2.example.com
          - user3.example.com
          - couple.example.com
          - user5.example.com

    DaysQuery:
      name: days
      in: query
      description: Time range in days
      schema:
        type: integer
        minimum: 1
        maximum: 365
        default: 30

    LimitQuery:
      name: limit
      in: query
      description: Results per page
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100

    OffsetQuery:
      name: offset
      in: query
      description: Pagination offset
      schema:
        type: integer
        minimum: 0
        default: 0

    SlugQuery:
      name: slug
      in: query
      description: Filter by slug
      schema:
        type: string

    PathFilterQuery:
      name: path
      in: query
      description: Filter by path
      schema:
        type: string

    CountryQuery:
      name: country
      in: query
      description: Filter by 2-letter country code
      schema:
        type: string
        minLength: 2
        maxLength: 2

    R2KeyQuery:
      name: r2Key
      in: query
      description: Filter by R2 key
      schema:
        type: string

    TargetUrlQuery:
      name: targetUrl
      in: query
      description: Filter by target URL
      schema:
        type: string

    ActionQuery:
      name: action
      in: query
      description: Filter by audit action type
      schema:
        type: string
        enum:
          - create
          - update
          - delete
          - toggle
          - seed
          - migrate
          - transfer
          - r2_upload
          - r2_delete
          - r2_rename
          - r2_move
          - r2_replace
          - r2_metadata_update
          - r2_cache_purge
          - r2_comment_update
          - feedback_create
          - feedback_triage
          - feedback_delete
          - r2_object_create
          - r2_object_delete
          - cf_config_change

    SourceQuery:
      name: source
      in: query
      description: Filter by audit source pipeline (v1.28.0)
      schema:
        type: string
        enum:
          - bifrost
          - r2_event
          - cf_audit

    SearchQuery:
      name: search
      in: query
      description: Full-text search across route fields
      schema:
        type: string

    BucketPath:
      name: bucket
      in: path
      required: true
      description: R2 bucket name
      schema:
        type: string
        enum: [files, assets, files-user1, files-user2, files-user3, files-user4, files-user5, files-user6, bifrost-backups]

    R2KeyPath:
      name: key
      in: path
      required: true
      description: R2 object key
      schema:
        type: string

    ActorQuery:
      name: actor
      in: query
      description: Filter by actor login
      schema:
        type: string

    FeedbackIdPath:
      name: id
      in: path
      required: true
      description: Feedback item id (UUIDv7)
      schema:
        type: string

    FeedbackStatusQuery:
      name: status
      in: query
      description: Filter by triage status
      schema:
        type: string
        enum: [new, triaged, in_progress, resolved, wontfix, duplicate]

    FeedbackTypeQuery:
      name: type
      in: query
      description: Filter by feedback type
      schema:
        type: string
        enum: [bug, feature, question, other]

    FeedbackPriorityQuery:
      name: priority
      in: query
      description: Filter by triage priority (0 none, 1 urgent, 2 high, 3 medium, 4 low)
      schema:
        type: integer
        minimum: 0
        maximum: 4

    FeedbackSinceQuery:
      name: since
      in: query
      description: Filter to items created at or after this timestamp
      schema:
        type: string

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]
        version:
          type: string
        timestamp:
          type: integer
          description: Unix epoch milliseconds
        env:
          type: string
          enum: [production, development]
        hostname:
          type: string
          description: Request hostname

    CreateRouteInput:
      type: object
      required:
        - path
        - type
        - target
      properties:
        path:
          type: string
          minLength: 1
          pattern: ^/.*
        type:
          type: string
          enum: [redirect, proxy, r2]
        target:
          type: string
          minLength: 1
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
        preserveQuery:
          type: boolean
          default: true
        preservePath:
          type: boolean
          default: false
        cacheControl:
          type: string
        hostHeader:
          type: string
          description: Override Host header for proxy requests
        forceDownload:
          type: boolean
          default: false
        bucket:
          type: string
          enum: [files, assets, files-user1, files-user2, files-user3, files-user4, files-user5, files-user6]
          default: files
          description: R2 bucket for file serving (R2 only)
        enabled:
          type: boolean
          default: true

    UpdateRouteInput:
      type: object
      properties:
        type:
          type: string
          enum: [redirect, proxy, r2]
        target:
          type: string
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
        preserveQuery:
          type: boolean
        preservePath:
          type: boolean
        cacheControl:
          type: string
        hostHeader:
          type: string
          description: Override Host header for proxy requests
        forceDownload:
          type: boolean
        bucket:
          type: string
          enum: [files, assets, files-user1, files-user2, files-user3, files-user4, files-user5, files-user6]
          description: R2 bucket for file serving (R2 only)
        enabled:
          type: boolean

    SeedRoutesInput:
      type: object
      required:
        - routes
      properties:
        routes:
          type: array
          items:
            $ref: '#/components/schemas/CreateRouteInput'

    BackupHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, warning, critical]
          description: Overall health status
        timestamp:
          type: string
          format: date-time
          description: Timestamp of this health check
        lastBackup:
          type: object
          nullable: true
          description: Information about the latest backup (null if none found)
          properties:
            date:
              type: string
              description: Backup date in YYYYMMDD format
            timestamp:
              type: string
              format: date-time
            ageHours:
              type: number
            manifest:
              type: object
              nullable: true
              properties:
                version:
                  type: string
                kv:
                  type: object
                  properties:
                    totalRoutes:
                      type: integer
                    domains:
                      type: array
                      items:
                        type: string
                d1:
                  type: object
                  properties:
                    totalRows:
                      type: integer
                    tables:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          rows:
                            type: integer
            files:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  size:
                    type: integer
                  exists:
                    type: boolean
        issues:
          type: array
          items:
            type: object
            properties:
              severity:
                type: string
                enum: [warning, critical]
              message:
                type: string
        checks:
          type: object
          properties:
            backupExists:
              type: boolean
            backupAge:
              type: string
              enum: [ok, warning, critical]
            manifestValid:
              type: boolean
            filesComplete:
              type: boolean
            routeCountOk:
              type: boolean

    RouteConfig:
      type: object
      properties:
        path:
          type: string
        type:
          type: string
          enum: [redirect, proxy, r2]
        target:
          type: string
        statusCode:
          type: integer
          enum: [301, 302, 307, 308]
        preserveQuery:
          type: boolean
        preservePath:
          type: boolean
        cacheControl:
          type: string
        hostHeader:
          type: string
        forceDownload:
          type: boolean
        bucket:
          type: string
        enabled:
          type: boolean
        createdAt:
          type: integer
          description: Unix epoch milliseconds
        updatedAt:
          type: integer
          description: Unix epoch milliseconds

    RouteConfigWithDomain:
      allOf:
        - $ref: '#/components/schemas/RouteConfig'
        - type: object
          properties:
            domain:
              type: string
              description: Domain the route belongs to

    RoutesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
        error:
          type: string

    TriageFeedbackInput:
      type: object
      description: Triage patch. All fields optional; at least one must be provided.
      minProperties: 1
      properties:
        status:
          type: string
          enum: [new, triaged, in_progress, resolved, wontfix, duplicate]
        priority:
          type: integer
          minimum: 0
          maximum: 4
        severity:
          type: string
          enum: [low, medium, high, critical]
        type:
          type: string
          enum: [bug, feature, question, other]
        labels:
          type: string
          nullable: true
          maxLength: 2000
        area:
          type: string
          nullable: true
          maxLength: 2000
        assignee:
          type: string
          nullable: true
          maxLength: 2000
        triageNotes:
          type: string
          nullable: true
          maxLength: 2000
        linkedPr:
          type: string
          nullable: true
          maxLength: 2000
        externalRef:
          type: string
          nullable: true
          maxLength: 2000

    FeedbackItem:
      type: object
      properties:
        id:
          type: string
        shortId:
          type: string
          description: Human-quotable short id (F-<n>)
        type:
          type: string
          enum: [bug, feature, question, other]
        severity:
          type: string
          nullable: true
          enum: [low, medium, high, critical]
        priority:
          type: integer
          minimum: 0
          maximum: 4
        status:
          type: string
          enum: [new, triaged, in_progress, resolved, wontfix, duplicate]
        title:
          type: string
        description:
          type: string
        steps:
          type: string
          nullable: true
        expected:
          type: string
          nullable: true
        actual:
          type: string
          nullable: true
        context:
          type: object
          nullable: true
          description: Tier-1 environment metadata
        screenshotKeys:
          type: array
          items:
            type: string
        captureKey:
          type: string
          nullable: true
        labels:
          type: string
          nullable: true
        area:
          type: string
          nullable: true
        assignee:
          type: string
          nullable: true
        triageNotes:
          type: string
          nullable: true
        linkedPr:
          type: string
          nullable: true
        externalRef:
          type: string
          nullable: true
        submitterEmail:
          type: string
          nullable: true
        submitterName:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        resolvedAt:
          type: string
          nullable: true
